# Optional local stack for Mac mini (William / Jarvis).
# Core agent (8787) + macOS helper (8788) run via launchd by default.
# Start extras: docker compose --profile redis up -d

services:
  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    restart: unless-stopped
    profiles: ["redis"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - jarvis_redis_data:/data
    command: redis-server --appendonly yes

  backup:
    image: alpine:3.20
    container_name: jarvis-backup
    restart: unless-stopped
    profiles: ["backup"]
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "0 3 * * * cp /data/jarvis.db /backups/jarvis-$$(date +\%Y\%m\%d-\%H\%M).db" > /etc/crontabs/root
        crond -f -l 2

volumes:
  jarvis_redis_data:
