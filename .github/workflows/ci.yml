name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate OpenAPI
        run: pnpm --filter @rekentafel/contracts validate:openapi

      - name: Validate Prisma schema
        run: pnpm --filter @rekentafel/db db:validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rekentafel

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck
